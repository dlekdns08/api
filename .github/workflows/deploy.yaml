name: Deploy API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          ALLOWED_ORIGINS=http://5.104.87.242:3000
          EOF

      - name: Build and run
        run: |
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        run: |
          sleep 5
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            echo "Status: $STATUS ($i/15)"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed!"
          docker compose down || true
          exit 1

      - name: Notify self-healing
        if: failure()
        run: |
          curl -X POST http://5.104.87.242:8080/webhook/ci \
            -H 'Content-Type: application/json' \
            -H "x-ci-token: ${{ secrets.CI_WEBHOOK_TOKEN }}" \
            -d "{\"repo\":\"dlekdns08/api\",\"error_message\":\"Deploy failed\"}"