name: Deploy API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          ALLOWED_ORIGINS=https://koala.ai.kr,https://www.koala.ai.kr
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          BLOG_URL=${{ secrets.BLOG_URL }}
          API_URL=${{ secrets.API_URL }}
          NOTIFY_API_KEY=${{ secrets.NOTIFY_API_KEY }}
          EOF

      - name: Security scan
        run: |
          pip install bandit --quiet --break-system-packages 2>/dev/null || \
            pip install bandit --quiet 2>/dev/null || true
          BANDIT_OUT=$(bandit -r . -ll --exclude ./.venv,./tests -f json 2>/dev/null || echo '{}')
          HIGH=$(echo "$BANDIT_OUT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len([i for i in d.get('results',[]) if i.get('issue_severity') in ('HIGH','CRITICAL')]))" 2>/dev/null || echo "0")
          if [ "$HIGH" -gt "0" ]; then
            echo "::error::보안 스캔 실패 — HIGH/CRITICAL 취약점 ${HIGH}개 발견"
            echo "$BANDIT_OUT" > /tmp/api_logs.txt
            exit 1
          fi
          echo "Security scan passed."

      - name: Build and run
        run: |
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        run: |
          sleep 5
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            echo "Status: $STATUS ($i/15)"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed!"
          docker compose logs --no-color > /tmp/api_logs.txt 2>&1 || true
          docker compose down || true
          exit 1

      - name: Notify self-healing
        if: failure()
        run: |
          LOGS=$(cat /tmp/api_logs.txt 2>/dev/null | tail -c 4000 || echo "Deploy failed")
          PAYLOAD=$(jq -n --arg repo "dlekdns08/api" --arg logs "$LOGS" '{"repo":$repo,"logs":$logs}')
          curl -X POST http://5.104.87.242:8080/webhook/ci \
            -H 'Content-Type: application/json' \
            -H "x-ci-token: ${{ secrets.CI_WEBHOOK_TOKEN }}" \
            -d "$PAYLOAD"