name: Deploy API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          ALLOWED_ORIGINS=http://5.104.87.242:3000
          EOF

      - name: Security scan
        run: |
          pip install bandit --quiet --break-system-packages 2>/dev/null || true
          bandit -r . -ll --exit-zero -f txt 2>/dev/null || true
          if bandit -r . -lll --exit-zero -f txt 2>/dev/null | grep -q "HIGH\|CRITICAL"; then
            echo "::error::보안 스캔 실패 — HIGH/CRITICAL 취약점이 발견되었습니다."
            bandit -r . -lll -f txt 2>/dev/null > /tmp/api_logs.txt || true
            exit 1
          fi
          echo "Security scan passed."

      - name: Build and run
        run: |
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        run: |
          sleep 5
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            echo "Status: $STATUS ($i/15)"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed!"
          docker compose logs --no-color > /tmp/api_logs.txt 2>&1 || true
          docker compose down || true
          exit 1

      - name: Notify self-healing
        if: failure()
        run: |
          LOGS=$(cat /tmp/api_logs.txt 2>/dev/null | tail -c 4000 || echo "Deploy failed")
          PAYLOAD=$(jq -n --arg repo "dlekdns08/api" --arg logs "$LOGS" '{"repo":$repo,"logs":$logs}')
          curl -X POST http://5.104.87.242:8080/webhook/ci \
            -H 'Content-Type: application/json' \
            -H "x-ci-token: ${{ secrets.CI_WEBHOOK_TOKEN }}" \
            -d "$PAYLOAD"