name: Deploy API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          ALLOWED_ORIGINS=http://5.104.87.242:3000
          EOF

      - name: Build and run
        run: |
          docker compose down || true
          docker compose up -d --build

      - name: Notify self-healing
        if: failure()
        run: |
          curl -X POST http://5.104.87.242:8080/webhook/ci \
            -H 'Content-Type: application/json' \
            -H "x-ci-token: ${{ secrets.CI_WEBHOOK_TOKEN }}" \
            -d "{\"repo\":\"dlekdns08/api\",\"error_message\":\"Deploy failed\"}"